    <style type="text/css">
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f8f8;
            color: #333;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        #main {
            text-align: center;
            margin-top: 20px;
        }

        #error {
            font-size: 20px;
            color: #b30000;
            margin-top: 20px;
            display: none;
        }

        #wrap {
            margin-top: 30px;
        }

        #text {
            font-size: 16px;
            line-height: 1.4;
            color: #333;
            font-family: 'Microsoft YaHei', sans-serif;
            margin-bottom: 20px;
            word-wrap: break-word;
            white-space: normal;
        }

        #code .say {
            font-size: 18px;
            color: #FF0000;
            margin-bottom: 10px;
        }

        #clock-box {
            margin-top: 20px;
            font-size: 18px;
        }

        #clock {
            font-size: 22px;
            font-weight: bold;
            color: #33CC00;
        }

        #canvas {
            margin-top: 20px;
            border: 1px solid #ccc;
            background-color: #fff;
        }

        .STYLE1 {
            color: #666666;
        }

        .footer {
            font-size: 14px;
            color: #999;
            margin-top: 40px;
        }

        .footer a {
            color: #33CC00;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>

<body>
    <div id="main">
        <div id="error">曾经沧海难为水，除却巫山不是云。取次花丛懒回顾，半缘修道半缘君。</div>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <font color="#FF0000">
                        <span class="say">忽有故人心上过</span><br>
                        <span class="say">回首山河已是秋</span><br>
                        <span class="say">他朝若是同淋雪</span><br>
                        <span class="say">此生也算共白头</span><br>
                        <span class="say">白头并非雪可替</span><br>
                        <span class="say">遇见已是上上签</span><br>
                        <span class="say">风吹雪散故人离</span><br>
                        <span class="say">陌路只当忆往年</span><br>
                        <span class="say"><span class="space"></span>皮皮虾</span>
                    </font>
                </div>
            </div>
            <div id="clock-box">
                <span class="STYLE1"></span>
                <font color="#33CC00">The Thief of Time</font> 
                <span class="STYLE1">Steal our time</span>
                <div id="clock"></div>
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <div style="text-align:center;">
        <p>皮皮虾：<a href="index.html" title="皮皮虾">曾经沧海难为水，除却巫山不是云。取次花丛懒回顾，半缘修道半缘君。</a></p>
